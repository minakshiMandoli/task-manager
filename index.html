<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task manager</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <h1>Task Manager</h1>
    <section class="task-manager">
        <form id="task-form">
            <input type="text" placeholder="Enter your task" id="task-input" required>
            <button type="button" id="add-task-btn">Add Task</button>
        </form>
    </section>
   


       <section id="task-container">

       </section>

           <div class="confirm">
        <h1>Confirm your action</h1>
        <p>Are you <strong>really</strong> sure that you want to delete this task?</p>
        <div class="confirm-actions">
            <button class="cancel">Cancel</button>
            <button autofocus class="confirmed">Confirm</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
